<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자율학습 관리자 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 850px; }
        .refresh-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-refresh { background-color: #0064ff; color: white; padding: 8px 16px; font-size: 14px; width: auto; }
        .btn-danger-clear { background-color: #fa3e3e; color: white; padding: 8px 16px; font-size: 14px; width: auto; border:none; border-radius:8px; cursor:pointer; font-weight:bold;}
        .status-table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: #ffffff; font-size: 14px; text-align: center; }
        .status-table th, .status-table td { border: 1px solid #e4e6eb; padding: 12px 8px; }
        .status-table th { background-color: #f7f8fa; color: #4b4c4f; font-weight: bold; }
        .status-table tr:hover { background-color: #f2f3f5; }
        .text-absent { color: #fa3e3e; font-weight: bold; }
        .text-success { color: #00a400; font-weight: bold; }
        .no-data { color: #8a8d91; padding: 30px !important; font-style: italic; }
        .admin-footer { display: flex; justify-content: space-between; margin-top: 20px; }
        .back-link { font-size: 14px; color: #0064ff; text-decoration: none; font-weight: bold; line-height: 35px;}
    </style>
</head>
<body>

    <div class="app-container admin-container">
        <header>
            <h1>👨‍🏫 자율학습 관리자 대시보드</h1>
            <p class="date-text">누적된 학생들의 자습 참여 현황을 날짜별로 모니터링합니다.</p>
        </header>

        <main class="form-section">
            <div class="refresh-box">
                <h2>📋 누적 자습 기록판</h2>
                <button id="refresh-btn" class="btn btn-refresh">🔄 현황 새로고침</button>
            </div>

            <table class="status-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>학번</th>
                        <th>이름</th>
                        <th>신청 교시</th>
                        <th>출석 상태</th>
                        <th>총 학습 시간</th>
                        <th>사진 인증</th>
                        <th>비고 (불참 사유)</th>
                    </tr>
                </thead>
                <tbody id="student-list-body">
                    <tr>
                        <td colspan="8" class="no-data">제출된 데이터가 없습니다.</td>
                    </tr>
                </tbody>
            </table>

            <div class="admin-footer">
                <a href="index.html" class="back-link">⬅️ 학생 화면으로 이동</a>
                <button id="clear-btn" class="btn-danger-clear">🗑️ 전체 기록 초기화</button>
            </div>
        </main>
    </div>

    <script>
        function loadStudentStatus() {
            const tableBody = document.getElementById('student-list-body');
            
            // 1. 저장소에서 전체 누적 리스트 배열 가져오기
            const allStudentsList = JSON.parse(localStorage.getItem('allStudentsList')) || [];
            
            if (allStudentsList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" class="no-data">현재 누적된 학생 출석 데이터가 없습니다.</td></tr>`;
                return;
            }

            // 최신 날짜 역순(가장 최근 데이터가 맨 위로) 정렬 규칙 추가
            allStudentsList.sort((a, b) => new Date(b.date) - new Date(a.date));

            let htmlContent = "";

            // 2. 누적된 데이터를 반복문으로 돌리며 한 줄씩 조립
            allStudentsList.forEach(student => {
                let statusText = student.isAbsent ? "❌ 불참" : `✔️ 출석 (${student.authTime})`;
                let statusClass = student.isAbsent ? "text-absent" : "text-success";
                
                htmlContent += `
                    <tr>
                        <td><strong>${student.date}</strong></td>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.session}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>⏱️ ${student.studyTime}</td>
                        <td>${student.isPhotoVerified}</td>
                        <td>${student.reason}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = htmlContent;
        }

        // 페이지 로드 시 구동
        document.addEventListener('DOMContentLoaded', loadStudentStatus);

        // 새로고침 버튼
        document.getElementById('refresh-btn').addEventListener('click', function() {
            loadStudentStatus();
            alert("최신 데이터 현황판 업데이트 완료!");
        });

        // 데이터 초기화 버튼
        document.getElementById('clear-btn').addEventListener('click', function() {
            if (confirm("🚨 진짜로 깃허브 서버(브라우저)에 기록된 '모든 학생들의 누적 데이터'를 영구 삭제하시겠습니까?")) {
                localStorage.removeItem('allStudentsList');
                localStorage.removeItem('currentStudentSession');
                loadStudentStatus();
                alert("모든 누적 기록이 초기화되었습니다.");
            }
        });
    </script>
</body>
</html>
