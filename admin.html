<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자율학습 관리자 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 관리자 페이지 전용 추가 스타일 */
        .admin-container {
            max-width: 800px; /* 표가 잘 보이도록 화면을 더 넓게 설정 */
        }
        
        .refresh-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-refresh {
            background-color: #0064ff;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }

        /* 출석 현황 표 스타일 */
        .status-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #ffffff;
            font-size: 14px;
            text-align: center;
        }

        .status-table th, .status-table td {
            border: 1px solid #e4e6eb;
            padding: 12px 8px;
        }

        .status-table th {
            background-color: #f7f8fa;
            color: #4b4c4f;
            font-weight: bold;
        }

        .status-table tr:hover {
            background-color: #f2f3f5;
        }

        /* 상태별 텍스트 색상 고정 */
        .text-absent { color: #fa3e3e; font-weight: bold; }
        .text-success { color: #00a400; font-weight: bold; }
        
        .no-data {
            color: #8a8d91;
            padding: 30px !important;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container admin-container">
        <header>
            <h1>👨‍🏫 자율학습 관리자 대시보드</h1>
            <p class="date-text">실시간 학생 자습 참여 현황을 모니터링합니다.</p>
        </header>

        <main class="form-section">
            <div class="refresh-box">
                <h2>📋 학생 출석 및 학습 기록 현황</h2>
                <button id="refresh-btn" class="btn btn-refresh">🔄 새로고침</button>
            </div>

            <table class="status-table">
                <thead>
                    <tr>
                        <th>학번</th>
                        <th>이름</th>
                        <th>신청 교시</th>
                        <th>출석 상태</th>
                        <th>총 학습 시간</th>
                        <th>사진 인증</th>
                        <th>비고 (불참 사유)</th>
                    </tr>
                </thead>
                <tbody id="student-list-body">
                    <tr>
                        <td colspan="7" class="no-data">제출된 데이터가 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        // 데이터를 가져와서 표에 뿌려주는 함수
        function loadStudentStatus() {
            const tableBody = document.getElementById('student-list-body');
            
            // 1. 저장소에서 현재 학생 데이터 가져오기
            const rawData = localStorage.getItem('currentStudent');
            
            // 데이터가 없으면 기본 안내 문구 띄우기
            if (!rawData) {
                tableBody.innerHTML = `<tr><td colspan="7" class="no-data">현재 등록된 학생 출석 데이터가 없습니다.</td></tr>`;
                return;
            }

            // 글자 형태의 데이터를 컴퓨터가 읽을 수 있는 객체로 변환
            const student = JSON.parse(rawData);
            
            // 2. 불참 여부에 따른 상태 분기 처리
            let statusText = "";
            let statusClass = "";
            
            if (student.isAbsent) {
                statusText = "❌ 불참";
                statusClass = "text-absent";
            } else {
                statusText = `✔️ 출석 (${student.authTime})`;
                statusClass = "text-success";
            }

            // 3. 표(Table)의 HTML 구조 짜기
            tableBody.innerHTML = `
                <tr>
                    <td><strong>${student.id}</strong></td>
                    <td>${student.name}</td>
                    <td>${student.session}</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td>⏱️ ${student.studyTime}</td>
                    <td>${student.isPhotoVerified}</td>
                    <td>${student.reason}</td>
                </tr>
            `;
        }

        // 페이지가 처음 열릴 때 데이터 로드
        document.addEventListener('DOMContentLoaded', loadStudentStatus);

        // 새로고침 버튼을 누르면 데이터 다시 로드
        document.getElementById('refresh-btn').addEventListener('click', function() {
            loadStudentStatus();
            alert("최신 데이터로 업데이트되었습니다!");
        });
    </script>
</body>
</html>
